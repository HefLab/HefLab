<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Font Size Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: Arial, sans-serif; padding: 20px; }
  h1 { color: #fff; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; }

  .controls {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: center;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  label { color: #aaa; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  input[type=range] { width: 200px; accent-color: #FFD700; }
  .val { color: #FFD700; font-size: 13px; font-weight: bold; }

  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset-btn {
    background: #222;
    border: 1px solid #444;
    color: #ccc;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .preset-btn:hover, .preset-btn.active { background: #FFD700; color: #000; border-color: #FFD700; font-weight: bold; }

  .phone-frame {
    width: 390px;
    margin: 0 auto 30px;
    border: 3px solid #444;
    border-radius: 36px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    background: #000;
    padding: 12px 6px;
  }
  .phone-label {
    text-align: center;
    color: #555;
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .header-mock {
    background: #1B2A6B;
    border-bottom: 6px solid #FFD700;
    padding: 20px 16px 18px;
    text-align: center;
    background-image:
      radial-gradient(ellipse 55% 90% at 50% 50%,
        rgba(27,42,107,0.97) 0%,
        rgba(27,42,107,0.92) 35%,
        rgba(27,42,107,0.55) 60%,
        rgba(27,42,107,0.15) 80%,
        rgba(27,42,107,0.0) 100%
      ),
      linear-gradient(135deg, #1a1a3e 0%, #2a3a7b 50%, #1a1a3e 100%);
    background-size: cover;
    background-position: center;
  }

  .week-badge {
    display: inline-block;
    background: #F5F0E0;
    color: #1B2A6B;
    font-size: 11px;
    font-weight: 1000;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 18px;
    border-radius: 3px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transform: rotate(-1deg);
  }

  .title-mostly {
    font-weight: 900;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: -1px;
    color: #fff;
    text-shadow: 4px 4px 0px #CC1122, 6px 6px 0px rgba(0,0,0,0.3);
    transition: font-size 0.2s;
  }
  .title-grid {
    font-weight: 900;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: -1px;
    color: #FFD700;
    text-shadow: 4px 4px 0px #CC1122, 6px 6px 0px rgba(0,0,0,0.4);
    transition: font-size 0.2s;
  }

  .blue-badge {
    display: inline-block;
    background: #CC1122;
    color: #fff;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 20px;
    border-radius: 3px;
    margin-top: 10px;
    margin-bottom: 14px;
    border: 2px solid #FFD700;
    text-shadow: -1px -1px 0 #1B2A6B, 1px -1px 0 #1B2A6B, -1px 1px 0 #1B2A6B, 1px 1px 0 #1B2A6B;
    box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
    font-size: 11px;
    transition: font-size 0.2s;
  }

  .subtitle {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 14px;
    font-family: Arial, sans-serif;
  }

  .prompt-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    margin-top: 24px;
  }
  .prompt-label { color: #aaa; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .prompt-text { color: #FFD700; font-size: 13px; line-height: 1.5; }
  .copy-btn {
    margin-top: 10px;
    background: #FFD700;
    color: #000;
    border: none;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
  }
  .copy-btn:hover { background: #ffe44d; }
</style>
</head>
<body>

<h1>Header Font Size Preview — Mobile (390px)</h1>

<div class="controls">
  <div class="control-group">
    <label>Mobile Floor (min size) — <span class="val" id="minVal">28px</span></label>
    <input type="range" id="minSlider" min="24" max="56" step="1" value="28">
  </div>
  <div class="control-group">
    <label>Desktop Cap (max size) — <span class="val" id="maxVal">54px</span></label>
    <input type="range" id="maxSlider" min="40" max="80" step="1" value="54">
  </div>
  <div class="control-group">
    <label>Presets</label>
    <div class="presets">
      <button class="preset-btn active" onclick="setPreset(28,54,this)">Current</button>
      <button class="preset-btn" onclick="setPreset(34,56,this)">Slightly Bigger</button>
      <button class="preset-btn" onclick="setPreset(40,60,this)">Noticeably Bigger</button>
      <button class="preset-btn" onclick="setPreset(46,64,this)">Bold & Large</button>
      <button class="preset-btn" onclick="setPreset(52,68,this)">Max Out</button>
    </div>
  </div>
</div>

<div class="phone-label">390px — iPhone 14 / Pixel</div>
<div class="phone-frame">
  <div class="header-mock">
    <div class="week-badge">WEEK 1: THIS IS MARCH</div>
    <div style="margin-bottom:4px">
      <div class="title-mostly" id="titleMostly">THE MOSTLY</div>
      <div class="title-grid" id="titleGrid">IMMACULATE GRID</div>
    </div>
    <div class="blue-badge" id="blueBadge">BLUE BLOOD BALLERS</div>
    <div class="subtitle" id="signinLine">Sign-In &nbsp;•&nbsp; Sign-Up &nbsp;•&nbsp; View Leaderboards</div>
    <!-- Score boxes for width reference -->
    <div style="display:flex;justify-content:center;align-items:stretch;gap:6px;margin-bottom:14px;flex-wrap:wrap;" id="scoreBoxes">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;background:#145a2e;border:2px solid #22c55e;border-radius:8px;padding:8px 18px;box-shadow:0 3px 0px rgba(0,0,0,0.3);min-width:80px">
        <div style="font-size:22px;font-weight:900;color:#4ade80;line-height:1">3</div>
        <div style="font-size:9px;color:#86efac;font-weight:700;letter-spacing:1.5px;margin-top:3px">CORRECT</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;background:#5a0a0a;border:2px solid #dc2626;border-radius:8px;padding:8px 18px;box-shadow:0 3px 0px rgba(0,0,0,0.3);min-width:80px">
        <div style="font-size:22px;font-weight:900;color:#f87171;line-height:1">1</div>
        <div style="font-size:9px;color:#fca5a5;font-weight:700;letter-spacing:1.5px;margin-top:3px">INCORRECT</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1B2A6B;border:2px solid #FFD700;border-radius:8px;padding:8px 18px;box-shadow:0 3px 0px rgba(0,0,0,0.3);min-width:80px">
        <div style="font-size:22px;font-weight:900;color:#FFD700;line-height:1">12</div>
        <div style="font-size:9px;color:rgba(255,212,0,0.7);font-weight:700;letter-spacing:1.5px;margin-top:3px">LEFT</div>
      </div>
    </div>
    <!-- Width reference lines -->
    <div style="position:relative;height:2px;margin-bottom:8px;">
      <div id="titleWidthBar" style="position:absolute;left:50%;transform:translateX(-50%);height:2px;background:rgba(255,255,255,0.4);transition:width 0.2s;"></div>
    </div>
    <div style="font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:6px;" id="widthReadout"></div>
  </div>
</div>

<div class="prompt-box">
  <div class="prompt-label">Current Settings</div>
  <div class="prompt-text" id="promptText"></div>
  <button class="copy-btn" onclick="copyPrompt()">Copy</button>
</div>

<script>
  let minSize = 28, maxSize = 54;

  function update() {
    const vwVal = Math.round(minSize / 3.9 * 10) / 10;
    const fs = `clamp(${minSize}px, ${vwVal}vw, ${maxSize}px)`;
    document.getElementById('titleMostly').style.fontSize = fs;
    document.getElementById('titleGrid').style.fontSize = fs;
    document.getElementById('minVal').textContent = minSize + 'px';
    document.getElementById('maxVal').textContent = maxSize + 'px';
    // measure widths after paint
    requestAnimationFrame(() => {
      const gridEl = document.getElementById('titleGrid');
      const signinEl = document.getElementById('signinLine');
      const scoreEl = document.getElementById('scoreBoxes');
      const gridW = Math.round(gridEl.getBoundingClientRect().width);
      const signinW = Math.round(signinEl.getBoundingClientRect().width);
      const scoreW = Math.round(scoreEl.getBoundingClientRect().width);
      document.getElementById('titleWidthBar').style.width = gridW + 'px';
      document.getElementById('widthReadout').textContent =
        `IMMACULATE GRID: ${gridW}px  |  Sign-in line: ${signinW}px  |  Score boxes: ${scoreW}px`;
    });
    document.getElementById('promptText').textContent =
      `Set header title font to clamp(${minSize}px, ${vwVal}vw, ${maxSize}px) — mobile floor ${minSize}px, desktop cap ${maxSize}px.`;
  }

  document.getElementById('minSlider').addEventListener('input', function() {
    minSize = +this.value;
    clearActive();
    update();
  });
  document.getElementById('maxSlider').addEventListener('input', function() {
    maxSize = +this.value;
    clearActive();
    update();
  });

  function setPreset(min, max, btn) {
    minSize = min; maxSize = max;
    document.getElementById('minSlider').value = min;
    document.getElementById('maxSlider').value = max;
    clearActive();
    btn.classList.add('active');
    update();
  }

  function clearActive() {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  }

  function copyPrompt() {
    navigator.clipboard.writeText(document.getElementById('promptText').textContent);
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }

  update();
</script>
</body>
</html>
